<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Yoosu 💗</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Dancing Script', cursive;
  background: linear-gradient(135deg, #5a0f2e, #f5e6da);
  text-align: center;
  overflow: hidden;
}

/* COUNTDOWN */
#countdownScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #5a0f2e;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* MAIN */
#mainContent { display: none; }

/* PINTEREST STYLE BOX */
.box {
  background: #f5e6da;
  color: #5a0f2e;
  padding: 30px;
  border-radius: 15px;
  margin-top: 100px;
}

/* BUTTONS */
button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#yesBtn { background: #800020; color: white; }
#noBtn { background: #ccc; position: relative; }

/* KITTU */
#kittu { margin-top: 10px; }

/* GIFTS */
#gifts { display: none; }

.gift {
  width: 90px;
  height: 90px;
  background: #800020;
  margin: 20px;
  display: inline-block;
  cursor: pointer;
  border-radius: 10px;
}

/* CAKE */
#cake {
  display: none;
  font-size: 80px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-15px); }
}

/* GAME */
#game { display: none; }
#heart {
  position: absolute;
  font-size: 40px;
  cursor: pointer;
}

/* LOVE LETTER */
#letter {
  display: none;
  font-size: 24px;
  width: 80%;
  margin: auto;
}

/* STARS */
#stars {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100%{opacity:0;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<!-- COUNTDOWN -->
<div id="countdownScreen">
  <h2>⏳ Waiting for you...</h2>
  <h1 id="timer"></h1>
</div>

<div id="mainContent">

  <!-- INTRO -->
  <div class="box" id="introBox">
    <h1>HI YOOSU 💗</h1>
    <p>Do you want to see a surprise?</p>

    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>

    <div id="kittu">🐱 Kittu: press yes 😤</div>
  </div>

  <!-- GIFTS -->
  <div id="gifts">
    <div class="gift" onclick="openGift(0)"></div>
    <div class="gift" onclick="openGift(1)"></div>
    <div class="gift" onclick="openGift(2)"></div>

    <div id="cake">🎂</div>
  </div>

  <!-- GAME -->
  <div id="game">
    <h3>Catch the heart 💖 5 times</h3>
    <div id="heart">💖</div>
  </div>

  <!-- LETTER -->
  <div id="letter"></div>

</div>

<div id="stars"></div>

<audio id="music" src="song.mp3"></audio>

<script>
// COUNTDOWN
let target = 0;
setInterval(()=>{
  let now = new Date().getTime();
  let d = target - now;

  if(d < 0){
    countdownScreen.style.display="none";
    mainContent.style.display="block";
  } else {
    timer.innerHTML =
    Math.floor(d/86400000)+"d "+
    Math.floor(d%86400000/3600000)+"h "+
    Math.floor(d%3600000/60000)+"m "+
    Math.floor(d%60000/1000)+"s";
  }
},1000);

// YES NO
let size = 16;
noBtn.onclick=()=>{
  size+=10;
  yesBtn.style.fontSize=size+"px";

  noBtn.style.position="absolute";
  noBtn.style.left=Math.random()*200+"px";
  noBtn.style.top=Math.random()*200+"px";

  kittu.innerText="🐱 NO?? really?? 😭 press YES";
};

yesBtn.onclick=()=>{
  introBox.style.display="none";
  gifts.style.display="block";
  music.play();
};

// GIFTS
let opened=0;
function openGift(i){
  opened++;
  if(opened==3){
    cake.style.display="block";
    game.style.display="block";
    moveHeart();
  }
}

// GAME
let count=0;
function moveHeart(){
  heart.style.left=Math.random()*90+"%";
  heart.style.top=Math.random()*80+"%";
}

heart.onclick=()=>{
  count++;
  if(count>=5){
    showLetter();
  } else moveHeart();
};

// TYPING LETTER
let text="Happy Birthday Yoosu 💗\nYou are my favorite person.\nYou make my world softer.\nStay with me forever.";
let i=0;

function showLetter(){
  game.style.display="none";
  letter.style.display="block";

  let typing=setInterval(()=>{
    letter.innerHTML += text[i];
    i++;
    if(i>=text.length){
      clearInterval(typing);
      startStars();
    }
  },50);
}

// STARS
function startStars(){
  mainContent.style.display="none";
  stars.style.display="block";

  for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    stars.appendChild(s);
  }
}
</script>

</body>
</html>
